<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe • BLACKSAUCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --glass: rgba(20, 15, 15, 0.9);
      --accent: #a8181f;
      --accent-glow: rgba(168, 24, 31, 0.5);
      --bot: #c9a227;
      --friend: #888;
      --text: #f0f0f0;
      --text-dim: #888;
      --border: rgba(201, 162, 39, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(168, 24, 31, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(201, 162, 39, 0.08) 0%, transparent 50%);
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.5rem;
      margin-bottom: 15px;
      background: linear-gradient(180deg, #f0f0f0, #c9a227);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      text-align: center;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-dim);
      margin-bottom: 45px;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .choice-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }

    .choice-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 35px 45px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .choice-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7),
                  0 0 30px var(--accent-glow);
      border-color: var(--accent);
    }

    .choice-card i {
      font-size: 3rem;
      color: var(--bot);
    }

    .choice-card h2 {
      font-size: 1.4rem;
      color: var(--text);
    }

    .choice-card p {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin: 0;
    }

    .choice-card.bot {
      background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.98));
    }

    .choice-card.friend {
      background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.98));
    }

    .back-link {
      margin-top: 40px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #c9a227;
    }
  </style>
</head>
<body>

  <h1>Tic-Tac-Toe</h1>
  <p class="subtitle">Choose Your Opponent</p>

  <div class="choice-container">
    <a href="tictactoe.html" class="choice-card bot">
      <i class="fas fa-robot"></i>
      <h2>vs Bot</h2>
      <p>Play against the computer</p>
    </a>

    <a href="tttbot.html" class="choice-card friend">
      <i class="fas fa-user"></i>
      <h2>vs Friend</h2>
      <p>Two player on same device</p>
    </a>
  </div>

  <a href="choose.html" class="back-link">← Back to BLACKSAUCE</a>

</body>
</html>
