<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification | BLACKSAUCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sauce-red: #a8181f;
            --gold: #c9a227;
            --bg: #0a0a0a;
        }

        body {
            font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0d0d0d 0%, #1a0a0a 50%, #0a0505 100%);
            background-attachment: fixed;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--sauce-red) 0%, transparent 70%);
            opacity: 0.1;
            z-index: 0;
        }

        .container {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.98));
            padding: 50px 40px;
            border-radius: 4px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(201, 162, 39, 0.2);
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        h1 { 
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--gold); 
            margin-bottom: 15px;
            font-size: 1.8rem;
            letter-spacing: 3px;
        }
        
        p { font-size: 1.1rem; color: #aaa; line-height: 1.6; }

        h2 { font-size: 0.9rem; margin-top: 30px; color: #777; letter-spacing: 2px; text-transform: uppercase; }

        .btn-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 14px 25px;
            border-radius: 2px;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: linear-gradient(145deg, var(--sauce-red), #6b0a0f);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 24, 31, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(201, 162, 39, 0.4);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            background: rgba(201, 162, 39, 0.1);
        }

        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <p>BLACKSAUCE is a curated experience for those aged 15 and above.</p>
        
        <h2>Explore other options:</h2>
        
        <div class="btn-group">
            <a href="choose.html"><button class="btn-primary">Enter BLACKSAUCE</button></a>
            <a href="index.html"><button class="btn-secondary">Back to Entry</button></a>
        </div>
    </div>

</body>
</html>
