<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe • BLACKSAUCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --board: rgba(20, 15, 15, 0.9);
      --cell: rgba(40, 30, 30, 0.7);
      --x: #a8181f;
      --o: #c9a227;
      --text: #f0f0f0;
      --glow: rgba(168, 24, 31, 0.4);
      --border: rgba(201, 162, 39, 0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(168, 24, 31, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(201, 162, 39, 0.08) 0%, transparent 50%);
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.5rem;
      margin-bottom: 15px;
      background: linear-gradient(180deg, #f0f0f0, #c9a227);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.3rem;
      margin: 15px 0;
      min-height: 2rem;
      color: #888;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      background: var(--border);
      padding: 5px;
      border-radius: 4px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    }

    .cell {
      width: 85px;
      height: 85px;
      background: var(--board);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 2px;
    }

    .cell:hover:not(.taken) {
      background: var(--cell);
    }

    .cell.x { color: var(--x); text-shadow: 0 0 20px var(--glow); }
    .cell.o { color: var(--o); text-shadow: 0 0 20px rgba(201, 162, 39, 0.4); }

    .btn {
      padding: 12px 30px;
      margin-top: 20px;
      border-radius: 2px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .btn-restart {
      background: linear-gradient(145deg, #a8181f, #6b0a0f);
      color: white;
    }

    .btn-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(168, 24, 31, 0.5);
    }

    .back-link {
      display: block;
      margin-top: 20px;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: #c9a227; }

    @media (max-width: 350px) {
      .cell { width: 65px; height: 65px; font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <h1>Tic-Tac-Toe</h1>
  <div id="status">Player X's Turn</div>

  <div id="board">
    <div class="cell" data-index="0" onclick="makeMove(0)"></div>
    <div class="cell" data-index="1" onclick="makeMove(1)"></div>
    <div class="cell" data-index="2" onclick="makeMove(2)"></div>
    <div class="cell" data-index="3" onclick="makeMove(3)"></div>
    <div class="cell" data-index="4" onclick="makeMove(4)"></div>
    <div class="cell" data-index="5" onclick="makeMove(5)"></div>
    <div class="cell" data-index="6" onclick="makeMove(6)"></div>
    <div class="cell" data-index="7" onclick="makeMove(7)"></div>
    <div class="cell" data-index="8" onclick="makeMove(8)"></div>
  </div>

  <button class="btn btn-restart" onclick="resetGame()">New Game</button>
  <a href="choose.html" class="back-link">← Back to BLACKSAUCE</a>

  <script>
    let currentPlayer = 'X';
    let gameState = ["", "", "", "", "", "", "", "", ""];
    let gameActive = true;

    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function makeMove(i) {
      if (gameState[i] || !gameActive) return;
      gameState[i] = currentPlayer;
      const cell = document.querySelectorAll('.cell')[i];
      cell.textContent = currentPlayer;
      cell.classList.add(currentPlayer.toLowerCase(), 'taken');

      if (checkWin()) {
        document.getElementById('status').textContent = currentPlayer + ' Wins!';
        document.getElementById('status').style.color = '#c9a227';
        gameActive = false;
        return;
      }

      if (!gameState.includes("")) {
        document.getElementById('status').textContent = 'Draw!';
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      document.getElementById('status').textContent = "Player " + currentPlayer + "'s Turn";
    }

    function checkWin() {
      return wins.some(c => c.every(i => gameState[i] === currentPlayer));
    }

    function resetGame() {
      currentPlayer = 'X';
      gameState = ["", "", "", "", "", "", "", "", ""];
      gameActive = true;
      document.getElementById('status').textContent = "Player X's Turn";
      document.getElementById('status').style.color = '#888';
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.classList.remove('x', 'o', 'taken');
      });
    }
  </script>
</body>
</html>
