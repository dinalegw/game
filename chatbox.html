<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat • BLACKSAUCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --glass: rgba(20, 15, 15, 0.85);
      --accent: #a8181f;
      --glow: rgba(168, 24, 31, 0.5);
      --orb-idle: #c9a227;
      --orb-active: #a8181f;
      --text: #f0f0f0;
      --text-dim: #888;
      --border: rgba(201, 162, 39, 0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(168, 24, 31, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(201, 162, 39, 0.08) 0%, transparent 50%);
    }

    .chat-container {
      width: 100%;
      max-width: 450px;
      height: 85vh;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.98));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .orb {
      width: 14px;
      height: 14px;
      background: var(--orb-idle);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--glow);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #f0f0f0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(40, 30, 30, 0.7);
      border: 1px solid rgba(201, 162, 39, 0.15);
      color: var(--text);
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(145deg, #a8181f, #6b0a0f);
      color: white;
    }

    #input-area {
      padding: 15px;
      background: rgba(15, 15, 15, 0.9);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 14px 18px;
      background: rgba(30, 30, 30, 0.6);
      border: 1px solid rgba(201, 162, 39, 0.2);
      border-radius: 2px;
      color: white;
      font-size: 1rem;
      font-family: 'Source Sans 3', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }

    #user-input::placeholder {
      color: #666;
    }

    #user-input:focus {
      border-color: #c9a227;
    }

    #send-btn, #mic-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    #mic-btn {
      background: rgba(40, 30, 30, 0.7);
      color: #888;
      border: 1px solid rgba(201, 162, 39, 0.2);
    }

    #mic-btn:hover {
      background: rgba(60, 45, 45, 0.8);
      color: #c9a227;
    }

    #send-btn {
      background: linear-gradient(145deg, #a8181f, #6b0a0f);
      color: white;
    }

    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(168, 24, 31, 0.5);
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 2px;
      color: #888;
      text-decoration: none;
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(201, 162, 39, 0.1);
      color: #c9a227;
    }
  </style>
</head>
<body>

  <a href="choose.html" class="back-btn">← Back</a>

  <div class="chat-container">
    <header>
      <div class="orb"></div>
      <h1>BLACKSAUCE Chat</h1>
    </header>

    <div id="messages">
      <div class="message bot">Hello! Welcome to BLACKSAUCE. How can I help you today?</div>
    </div>

    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" autofocus/>
      <button id="mic-btn" title="Voice"><i class="fas fa-microphone"></i></button>
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const botResponses = [
      "Interesting! Tell me more about that.",
      "That's a cool thought. What else is on your mind?",
      "I see! Do you have any questions about BLACKSAUCE?",
      "Got it! Feel free to ask me anything.",
      "Nice! I'm here to help. What would you like to know?",
      "Sure thing! The world is yours to explore.",
      "Great question! Keep the conversation going.",
      "I love that energy! What's next?",
      "That's fascinating! Want to hear a secret about BLACKSAUCE?",
      "You're doing great! Let's keep talking."
    ];

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function getBotResponse() {
      const input = userInput.value.toLowerCase();
      
      if (input.includes('hello') || input.includes('hi') || input.includes('hey')) {
        return "Hey there! Welcome to BLACKSAUCE. What's happening?";
      }
      if (input.includes('help')) {
        return "I'm here to chat! Ask me anything or just talk.";
      }
      if (input.includes('game') || input.includes('play')) {
        return "Want to play a game? Check out Tic-Tac-Toe or Rock Paper Scissors!";
      }
      if (input.includes('who') || input.includes('what')) {
        return "I'm BLACKSAUCE Bot - your chat companion. This is a classic experience.";
      }
      if (input.includes('bye') || input.includes('see ya')) {
        return "Catch you later! Come back anytime.";
      }
      
      return botResponses[Math.floor(Math.random() * botResponses.length)];
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      
      addMessage(text, 'user');
      userInput.value = '';
      
      setTimeout(() => {
        addMessage(getBotResponse(), 'bot');
      }, 500 + Math.random() * 500);
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
