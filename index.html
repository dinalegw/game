<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKSAUCE | Enter</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sauce-red: #a8181f;
            --sauce-dark: #6b0a0f;
            --carbon: #0a0a0a;
            --gold: #c9a227;
            --glass: rgba(168, 24, 31, 0.15);
            --border-gold: rgba(201, 162, 39, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0d0d0d 0%, #000000 50%, #0a0505 100%);
            color: #f5f5f5;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--sauce-red) 0%, transparent 70%);
            opacity: 0.08;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(201, 162, 39, 0.02) 50px,
                    rgba(201, 162, 39, 0.02) 51px
                );
            pointer-events: none;
        }

        .container {
            text-align: center;
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.98));
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 4px;
            border: 1px solid var(--border-gold);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(168, 24, 31, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            max-width: 380px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f5f5f5 0%, #c9a227 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 40px;
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--gold);
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 2px;
            color: #f5f5f5;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-family: 'Source Sans 3', sans-serif;
        }

        input::placeholder {
            color: #666;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, var(--sauce-red), var(--sauce-dark));
            color: #fff;
            border: none;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 20px rgba(168, 24, 31, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 30px rgba(168, 24, 31, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            background: linear-gradient(145deg, #c21c24, var(--sauce-red));
        }

        button:active {
            transform: translateY(0);
        }

        .logo-sauce {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-sauce">B</div>
    <h1>BLACKSAUCE</h1>
    <h2>The Classic Collection</h2>
    
    <div class="age">
        <h3>Enter Your Details</h3>
        <form id="ageform"> 
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="number" id="age" placeholder="Age" required>
            <button type="submit" id="hp">Enter</button>
        </form>
    </div>
</div>

<script>
document.getElementById("ageform").addEventListener("submit", function(e) { 
    e.preventDefault();
    const name = document.getElementById("name").value;
    const age = parseInt(document.getElementById("age").value);
    
    if (age >= 15 && age <= 60) {
        window.location.href = "choose.html";
    } else if (age < 15) {
        alert("Welcome, young one! " + name + " - You must be at least 15 to enter BLACKSAUCE.");
        window.location.href = "under18.html";
    } else if (age > 60) {
        alert("Welcome, wise one! " + name + " - BLACKSAUCE welcomes all seekers.");
    } else {
        alert("Please enter a valid age.");
    }
});
</script>

</body>
</html>
